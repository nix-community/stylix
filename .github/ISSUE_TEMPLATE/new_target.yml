---
description: Request the addition of a new target
labels: ["kind: new-target"]
name: New target
title: "<TARGET>: add target"

body:
  - type: textarea

    attributes:
      label: Description

      description: >-
        Describe the feature. Consider including links to existing themes, like
        a [tinted-theming repository](https://github.com/tinted-theming).

      placeholder: Type your description here…

    validations:
      required: true

  - type: checkboxes

    attributes:
      label: Submission Checklist

      options:
        - label: I assert that this issue is relevant to Stylix
          required: true

        - label: >-
            I assert that this is not a duplicate of an [existing
            issue](https://github.com/nix-community/stylix/issues?q=is%3Aissue)

          required: true

  - type: dropdown

    attributes:
      label: LLM-involvement Category

      description: >-
        Disclose the most most severe LLM-involvement category that applies to
        this issue.

      options:
        - >-
          `llm: 0`: Manual: The absence of LLMs would result in equal results
          and quality

        - "`llm: 1`: Syntactic: Includes non-negligible LLM content"
        - "`llm: 2`: Semantic: LLM involved in design decisions or core logic"
        - "`llm: 3`: Unaudited: LLM output with little to no human verification"

    validations:
      required: true
